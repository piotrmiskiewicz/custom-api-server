apiVersion: apps/v1
kind: Deployment
metadata:
  name: custom-api-server
  namespace: default
  labels:
    app: custom-api-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: custom-api-server
  template:
    metadata:
      labels:
        app: custom-api-server
    spec:
      containers:
        - name: custom-api-server
          image: ghcr.io/piotrmiskiewicz/custom-api-server:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8443
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8443
              scheme: HTTPS
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8443
              scheme: HTTPS
---
apiVersion: v1
kind: Service
metadata:
  name: custom-api-server
  namespace: default
spec:
  selector:
    app: custom-api-server
  ports:
    - port: 443
      targetPort: 8443
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: default
type: Opaque
stringData:
  POSTGRES_USER: apiserver
  POSTGRES_PASSWORD: apiserver
  POSTGRES_DB: apiserver
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: default
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          envFrom:
            - secretRef:
                name: postgres-credentials
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: default
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
